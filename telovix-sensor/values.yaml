# Telovix Sensor Helm Chart Values
# Full documentation: https://docs.telovix.com/deployment/kubernetes

# Container image
image:
  registry: registry.gitlab.com
  repository: telovix/sensor
  tag: ""  # Defaults to .Chart.AppVersion if empty
  pullPolicy: IfNotPresent
  pullSecrets: []

# ── Registry credentials ──────────────────────────────────────────────────────
# A read-only deploy token is bundled below so users can pull the sensor image
# without providing any credentials. The token has read_registry scope only —
# it cannot push images or access source code.
#
# Override with existingPullSecret if your organisation uses a centralised
# secret management solution:
#   kubectl create secret docker-registry telovix-registry \
#     --docker-server=registry.gitlab.com \
#     --docker-username=<your-user> \
#     --docker-password=<your-token> \
#     -n telovix
#   helm install ... --set existingPullSecret=telovix-registry
#
imageCredentials:
  # Registry server
  registry: registry.gitlab.com
  # Read-only deploy token - bundled for helm public use (read_registry scope only)
  username: "public-read-registry"
  password: "gldt-B1CEqyBXpGMXJ9zs6Dmz"

# Name of a pre-existing imagePullSecret to use instead of creating one.
# If set, imageCredentials above are ignored.
existingPullSecret: ""

# Sensor configuration (required for deployment)
sensor:
  # URL of the Telovix Console.
  # Example: https://console.your-org.com
  consoleUrl: ""

  # Enrollment token generated in the Telovix Console.
  # Go to Sensors -> Deploy -> Generate Enrollment Token.
  # Required for first-time enrollment. After enrollment the sensor uses mTLS.
  enrollmentToken: ""

  # Node role for policy targeting and fleet segmentation.
  # Leave empty to auto-detect from Kubernetes node labels:
  #   control-plane nodes -> control_plane
  #   worker nodes       -> generic_linux
  # Explicit override options: gnb, bgp_router, generic_linux
  nodeRole: ""

  # Override the node name reported to the Console.
  # Defaults to the Kubernetes node name (spec.nodeName).
  nodeNameOverride: ""

  # Path to a custom Console CA certificate for self-hosted deployments.
  # If empty, the system CA bundle is used.
  bootstrapCaCertPath: ""

  # Direct Kubernetes API server URL for clusters where hostNetwork: true
  # prevents service ClusterIP access (e.g. Cilium-based k3s clusters).
  # When empty, the sensor falls back to KUBERNETES_SERVICE_HOST env var,
  # then to https://kubernetes.default.svc.
  # Example: https://192.168.128.30:6443
  # Tip: set this to your master node IP and port when using Cilium.
  k8sApiserverUrl: ""

  # Existing Kubernetes secret containing the enrollment token.
  # If set, sensor.enrollmentToken is ignored and this secret is used instead.
  # The secret must have a key named: enrollmentToken
  existingSecret: ""

  # Bootstrap enrollment mode. Controls how the sensor authenticates for first enrollment.
  #
  # "token" (default): Use an enrollment token from sensor.enrollmentToken or sensor.existingSecret.
  #   - Short-lived tokens expire in 15 minutes (one-time use).
  #   - Cluster tokens (created via /api/v1/enrollment/cluster-tokens) are reusable
  #     and valid for up to 1 year - recommended for fleet deployments.
  #
  # "cert": Use a pre-issued bootstrap client certificate (advanced).
  #   Requires sensor.bootstrapCertPath pointing to a Console-issued client cert.
  #
  # "k8s-serviceaccount" (planned): Authenticate using the pod's projected ServiceAccount
  #   token - eliminates the need to distribute enrollment secrets altogether.
  #   Requires the Console to have Kubernetes API access for the target cluster.
  bootstrapMode: "token"

  # Deployment tags injected into the Console at enrollment time.
  # Tags allow fleet segmentation by network, site, or role without manual edits in the Console.
  # Format: key:value pairs or plain labels.
  #
  # Example — multi-site 5G deployment:
  #   tags:
  #     - network:oslo-5g
  #     - site:oslo-dc1
  #     - plmn:242-01
  #
  # Tags are applied once during enrollment and can be edited in the Console afterwards.
  tags: []

# ── Admission Controller ──────────────────────────────────────────────────────
# Enable the Telovix Kubernetes admission webhook.
# When enabled, K8s will call the Telovix Console before creating pods to
# enforce admission policies configured in the Console.
#
# Prerequisites:
#   1. Your Telovix Console must be reachable from the K8s API server
#   2. Set consoleUrl to your Console's HTTPS address
#   3. Set caBundle to the base64-encoded Console CA cert:
#      caBundle: $(curl -sk https://<console-url>/api/v1/kubernetes/admission/ca | python3 -c "import sys,json; print(json.load(sys.stdin)['ca_bundle'])")
#
admission:
  enabled: false
  # Console URL reachable from the K8s API server (not from pods)
  consoleUrl: ""
  # Base64-encoded CA certificate for the Console's TLS cert.
  # Get this from: curl -sk https://<console>/api/v1/kubernetes/admission/ca | jq -r .ca_bundle
  caBundle: ""
  # Webhook failure policy: Fail (deny if Console unreachable) or Ignore (allow if unreachable)
  # Use "Ignore" during initial setup. Switch to "Fail" in production.
  failurePolicy: "Ignore"
  # Namespaces to exclude from admission review (always allowed)
  excludeNamespaces:
    - kube-system
    - telovix-system
  # Optional: restrict to specific namespaces only (empty = all namespaces)
  includeNamespaces: []
  # Timeout for the admission webhook call in seconds (1-30)
  timeoutSeconds: 10

# Human-readable name for this cluster shown in the Telovix Console.
clusterName: ""

# Telovix Sensor resource allocations.
#
# The sensor runs eBPF programs entirely in kernel space; the userspace process
# is an epoll-driven event consumer, NOT a polling loop. Actual overhead at
# representative telecom workloads (NGAP/GTP-U traffic, active UE sessions):
#   Quiescent  : < 0.5% CPU, ~60 MB RSS
#   Normal load : < 1.0% CPU, ~80 MB RSS
#   Peak load   : < 2.0% CPU, ~120 MB RSS
#
# ── O-RAN vDU/vCU deployment note ─────────────────────────────────────────────
# On constrained O-RAN devices (vDU/vCU) with dedicated L1 DPDK cores:
#   - Use the values-oran-vdu.yaml overlay (cpu limit: 200m, memory limit: 256Mi)
#   - NEVER set cpu limit > 500m on a vDU — L1 radio processing has zero tolerance
#     for CPU contention on non-isolated cores.
#   - See docs/oran-deployment-guide.md for NUMA affinity and isolcpus guidance.
#
# These defaults are suitable for standard worker nodes (cloud, bare-metal servers).
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

serviceAccount:
  create: true
  name: telovix-sensor
  annotations: {}

rbac:
  create: true
  # Allow the sensor to read Kubernetes resources for workload context enrichment.
  clusterWide: true

# Default: tolerate all taints so every node gets a sensor, including control-plane nodes.
tolerations:
  - operator: Exists

# Deploy only to specific nodes if needed.
nodeSelector: {}

affinity: {}

# Raise scheduling priority so sensors are not evicted under node pressure.
priorityClass:
  create: false
  # Name used for the created PriorityClass when create=true.
  name: telovix-sensor-priority
  value: 1000
  preemptionPolicy: PreemptLowerPriority
  description: "Priority class for Telovix Sensor - ensures sensor pods are not evicted"

# The sensor stores mTLS certificates and policy packs at this host path.
statePath: /var/lib/telovix-sensor

# BPF filesystem host path.
bpfPath: /sys/fs/bpf

podAnnotations: {}
podLabels: {}

# eBPF requires privileged mode.
securityContext:
  privileged: true
  runAsUser: 0

# Required for host-wide telemetry.
hostPID: true
hostNetwork: true
hostIPC: false

# Use ClusterFirstWithHostNet when hostNetwork is true.
dnsPolicy: ClusterFirstWithHostNet

# Allow the sensor to flush events and cleanly shut down.
terminationGracePeriodSeconds: 30

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

openshift:
  enabled: false

# ── Network policy ────────────────────────────────────────────────────────────
# When enabled, creates a Kubernetes NetworkPolicy that:
#   - Denies all ingress (sensor never accepts inbound connections)
#   - Allows egress to port 53 (DNS) and the Console mTLS port (15484)
# Disabled by default. Enable in values-oran-vdu.yaml for RAN team certification.
# Note: effectiveness with hostNetwork=true depends on CNI support for HostEndpoints
# (Cilium NetworkPolicy, Calico GlobalNetworkPolicy). Verify with your CNI.
networkPolicy:
  enabled: false
  # TCP port of the Telovix Console mTLS listener (sensor heartbeat and enrollment).
  consolePort: 15484
  # Additional egress rules to merge into the policy. Useful for kube-apiserver
  # access when the sensor needs K8s API metadata enrichment, or for NTP servers.
  # Example:
  #   additionalEgressRules:
  #     - ports:
  #         - protocol: TCP
  #           port: 6443   # kube-apiserver
  additionalEgressRules: []

# ── Extra environment variables ───────────────────────────────────────────────
# Telecom environments commonly route outbound traffic through corporate proxies.
# If your Console is reachable only via proxy, set these variables so the sensor
# can reach it during enrollment and heartbeat.
#
# Example — HTTP/HTTPS proxy:
#   extraEnv:
#     - name: HTTP_PROXY
#       value: "http://proxy.corp.example.com:8080"
#     - name: HTTPS_PROXY
#       value: "http://proxy.corp.example.com:8080"
#     - name: NO_PROXY
#       value: "localhost,127.0.0.1,.cluster.local"
extraEnv: []

extraVolumeMounts: []
extraVolumes: []
