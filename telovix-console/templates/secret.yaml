apiVersion: v1
kind: Secret
metadata:
  name: {{ include "telovix-console.fullname" . }}-secret
  labels:
    {{- include "telovix-console.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.database.url | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | quote }}
  {{- if .Values.llm.apiKey }}
  TELOVIX_LLM_API_KEY: {{ .Values.llm.apiKey | quote }}
  {{- end }}
  {{- if .Values.bootstrap.adminEmail }}
  BOOTSTRAP_ADMIN_EMAIL: {{ .Values.bootstrap.adminEmail | quote }}
  BOOTSTRAP_ADMIN_PASSWORD_HASH: {{ .Values.bootstrap.adminPasswordHash | quote }}
  {{- end }}
  {{- if .Values.bootstrap.licenseBundle }}
  BOOTSTRAP_LICENSE_BUNDLE: {{ .Values.bootstrap.licenseBundle | quote }}
  {{- end }}
  {{- if .Values.managed.managementSecret }}
  TELOVIX_CONSOLE_MANAGEMENT_SECRET: {{ .Values.managed.managementSecret | quote }}
  {{- end }}
  {{- if .Values.smtp.password }}
  TELOVIX_CONSOLE_SMTP_PASSWORD: {{ .Values.smtp.password | quote }}
  {{- end }}
  {{- if .Values.packRegistry.sharedSecret }}
  TELOVIX_CONSOLE_PACK_REGISTRY_SHARED_SECRET: {{ .Values.packRegistry.sharedSecret | quote }}
  {{- end }}
  {{- if .Values.federation.centralApiKey }}
  TELOVIX_FEDERATION_CENTRAL_API_KEY: {{ .Values.federation.centralApiKey | quote }}
  {{- end }}
  {{- if .Values.federation.apiKey }}
  TELOVIX_FEDERATION_API_KEY: {{ .Values.federation.apiKey | quote }}
  {{- end }}
