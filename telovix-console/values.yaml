# Telovix Console Helm chart values
# Override these with --set or -f your-values.yaml

image:
  repository: registry.gitlab.com/telovix/console
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Deployment mode: "self_hosted" | "managed"
# Leave as self_hosted for customer-operated installs.
deploymentMode: self_hosted

# Platform vertical: "standard" | "telecom"
# telecom enables 5G/O-RAN NF monitoring, NGAP KPI tracking, and the Telco navigation section.
platformVertical: standard

replicaCount: 1

service:
  type: ClusterIP
  httpPort: 15483
  sensorPort: 15484

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: console.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Persistent storage for Console data (/data volume).
# Stores: local license bundle, staged update binaries, TLS material,
# policy signing key, and sensor binaries bundled into the image.
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /data

# PostgreSQL connection.
# Leave empty to configure via the Console setup wizard after first launch.
database:
  url: ""

# ClickHouse analytics.
# Leave empty to configure via the Console setup wizard after first launch.
clickhouse:
  url: ""
  database: telovix_console
  user: telovix_console
  password: ""

# SMTP for Console alert and invitation emails (optional).
smtp:
  server: ""
  port: 587
  username: ""
  password: ""
  fromAddress: "console@telovix.com"
  fromName: "Telovix Console"
  starttls: true
  sslTls: false

# AI / LLM integration (optional).
# Set provider to enable AI-assisted investigation and rule authoring.
# Supported providers: anthropic | openai | custom
# For "anthropic": set apiKey, model defaults to claude-sonnet-4-6
# For "openai": set apiKey and model
# For "custom": set apiKey, model, and baseUrl (OpenAI-compatible endpoint)
llm:
  provider: ""
  apiKey: ""
  model: ""
  baseUrl: ""
  maxContextTokens: 50000
  httpProxy: ""
  httpsProxy: ""

# CORS allowed origins (comma-separated).
# Defaults to the first ingress host if empty.
cors:
  allowedOrigins: ""

# Portal integration for license renewal and billing (optional for self-hosted).
portal:
  baseUrl: "https://portal.telovix.com"

# Update proxy settings.
update:
  httpProxy: ""
  httpsProxy: ""

# Federation — connect multiple Console instances (optional, advanced).
# role: standalone (default) | central | region
federation:
  role: ""
  regionId: ""
  centralUrl: ""
  centralApiKey: ""
  apiKey: ""
  exportIntervalSecs: 300

# Redpanda/Kafka — for scale-plan streaming ingestion (optional).
redpanda:
  enabled: false
  url: ""
  topic: "telovix.runtime_events"

# Pack registry — for signed policy pack updates (optional).
packRegistry:
  url: ""
  sharedSecret: ""

# Managed deployment bootstrap (set by Portal provisioner — do not edit manually).
bootstrap:
  adminEmail: ""
  adminName: ""
  adminPasswordHash: ""
  licenseBundle: ""

# Managed deployment IDs (set by Portal provisioner — do not edit manually).
managed:
  consoleId: ""
  managementSecret: ""

# TLS certificates for sensor mTLS (mount from an existing Secret).
sensorTls:
  secretName: ""
  mountPath: /run/secrets/telovix-tls

# Resource limits
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001

nameOverride: ""
fullnameOverride: ""
